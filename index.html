<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO -->
    <title>Stickman Stories — Where Ink Comes Alive</title>
    <meta name="description" content="Cinematic, emotional, and action-packed stories told through stickman animation. Every line has a story. Every dot has a name." />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Stickman Stories — Where Ink Comes Alive" />
    <meta property="og:description" content="Cinematic stickman animation stories. Watch the ink come alive." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stickmanstories.com" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Stickman Stories" />
    <meta name="twitter:description" content="Where ink comes alive. Watch cinematic stickman stories." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Font preloads for critical rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Theme color -->
    <meta name="theme-color" content="#F4EFE6" />
    
    <style>
      /* Prevent flash of default cursor before JS loads */
      @media (pointer: fine) {
        body { cursor: none; }
      }
      /* Prevent FOUC — set background immediately */
      body {
        background-color: #F4EFE6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
